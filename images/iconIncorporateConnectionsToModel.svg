<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tubería principal vertical (Azul) -->
  <line x1="32" y1="12" x2="32" y2="56" stroke="#60bcd3" stroke-width="8" stroke-linecap="round" />
  <circle cx="32" cy="12" r="4" fill="#60bcd3" />
  <circle cx="32" cy="56" r="4" fill="#60bcd3" />
  
  <!-- Casa 1 (Izquierda, arriba) - Verde sólido -->
  <g fill="#7fa828">
    <path d="M 8 28 L 24 28 L 24 16 L 16 8 L 8 16 Z" />
    <!-- Acometida entrando por la parte baja -->
    <line x1="24" y1="28" x2="32" y2="28" stroke="#7fa828" stroke-width="4" stroke-linecap="round" />
  </g>
  
  <!-- Casa 2 (Derecha, abajo) - Verde sólido -->
  <g fill="#7fa828">
    <path d="M 40 52 L 56 52 L 56 40 L 48 32 L 40 40 Z" />
    <!-- Acometida entrando por la parte baja -->
    <line x1="32" y1="52" x2="40" y2="52" stroke="#7fa828" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
