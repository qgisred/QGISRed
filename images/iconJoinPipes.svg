<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Línea izquierda (3 nodos) -->
  <line x1="16" y1="12" x2="16" y2="52" stroke="#60bcd3" stroke-width="6" />
  <circle cx="16" cy="12" r="6" fill="#60bcd3" />
  <circle cx="16" cy="32" r="6" fill="#60bcd3" />
  <circle cx="16" cy="52" r="6" fill="#60bcd3" />
  
  <!-- Línea derecha (2 nodos) -->
  <line x1="48" y1="12" x2="48" y2="52" stroke="#60bcd3" stroke-width="6" />
  <circle cx="48" cy="12" r="6" fill="#60bcd3" />
  <circle cx="48" cy="52" r="6" fill="#60bcd3" />
  
  <!-- Flecha al medio -->
  <line x1="24" y1="32" x2="36" y2="32" stroke="#60bcd3" stroke-width="4" stroke-linecap="round" />
  <polygon points="36,32 30,28 30,36" fill="#60bcd3" />
  
  <!-- Badge de check verde circular (Estandarizado) -->
  <g transform="translate(42, 42)">
    <circle cx="10" cy="10" r="10" fill="#7fa828" />
    <path d="M 6 10 L 9 13 L 14 7" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
