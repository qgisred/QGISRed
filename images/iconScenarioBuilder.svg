<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Nodo de red en el centro que se bifurca -->
  <!-- Nodos y conectores azules -->
  <circle cx="16" cy="32" r="6" fill="#60bcd3" />
  <line x1="16" y1="32" x2="28" y2="32" stroke="#60bcd3" stroke-width="4" />
  
  <circle cx="32" cy="32" r="6" fill="#60bcd3" />
  
  <!-- Opción 1: Arriba -->
  <line x1="32" y1="32" x2="44" y2="16" stroke="#60bcd3" stroke-width="4" stroke-linecap="round" />
  <circle cx="48" cy="16" r="6" fill="#60bcd3" />
  
  <!-- Opción 2: Abajo -->
  <line x1="32" y1="32" x2="44" y2="48" stroke="#60bcd3" stroke-width="4" stroke-linecap="round" />
  <circle cx="48" cy="48" r="6" fill="#60bcd3" />

  <!-- Camino alternativo / Escenario activo (Verde) -->
  <line x1="32" y1="32" x2="48" y2="32" stroke="#7fa828" stroke-width="6" stroke-linecap="round" />
  <!-- Nodo resaltado como escenario activo -->
  <circle cx="52" cy="32" r="8" fill="#7fa828" />
  <circle cx="52" cy="32" r="4" fill="#ffffff" />
</svg>
