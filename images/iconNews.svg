  <rect fill="#ffffff" x="15" y="27" width="28" height="3.5" rx="1.5"/>
  <rect fill="#ffffff" x="15" y="35" width="20" height="3.5" rx="1.5"/>
  <rect fill="#ffffff" x="15" y="43" width="24" height="3.5" rx="1.5"/>
  <!-- Badge verde con "!" para indicar novedad -->
  <circle class="cls-3" cx="48" cy="48" r="11"/>
