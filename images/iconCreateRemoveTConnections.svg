<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- T-Junction base (Azul) -->
  <g stroke="#60bcd3" stroke-width="8" stroke-linecap="round">
    <line x1="12" y1="32" x2="52" y2="32" />
    <line x1="32" y1="32" x2="32" y2="52" />
  </g>
  
  <!-- Símbolo de conmutación/estado (Verde destacado) -->
  <!-- Es un círculo de flechas que indica "cambio de estado" justo en la unión -->
  <g transform="translate(32, 32)">
    <circle cx="0" cy="0" r="14" fill="white" stroke="#7fa828" stroke-width="3" />
    <path d="M -8 -4 A 9 9 0 0 1 8 -4" fill="none" stroke="#7fa828" stroke-width="3" stroke-linecap="round" />
    <polygon points="8,-4 4,-8 12,-8" fill="#7fa828" />
    
    <path d="M 8 4 A 9 9 0 0 1 -8 4" fill="none" stroke="#7fa828" stroke-width="3" stroke-linecap="round" />
    <polygon points="-8,4 -4,8 -12,8" fill="#7fa828" />
  </g>
</svg>
