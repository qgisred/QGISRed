  <line x1="16" y1="24" x2="16" y2="40" stroke="#60bcd3" stroke-width="6" stroke-linecap="round" stroke-dasharray="4 6" opacity="0.8" />
  
  <!-- Elemento final -->
  <circle cx="16" cy="48" r="6" fill="#60bcd3" />
