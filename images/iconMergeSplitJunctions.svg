<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Estructura de unión/bifurcación (Azul) -->
  <!-- Una tubería que se divide en dos (Y horizontal) -->
  <g stroke="#60bcd3" stroke-width="8" stroke-linecap="round" fill="none">
    <line x1="12" y1="32" x2="32" y2="32" />
    <line x1="32" y1="32" x2="52" y2="16" />
    <line x1="32" y1="32" x2="52" y2="48" />
  </g>
  <circle cx="32" cy="32" r="10" fill="#60bcd3" />
  
  <!-- Símbolo de conmutación de estado (Verde con círculo blanco) -->
  <!-- Indica la transformación entre un nodo y varios -->
  <g transform="translate(32, 32)">
    <circle cx="0" cy="0" r="14" fill="white" stroke="#7fa828" stroke-width="3" />
    <path d="M -8 -4 A 9 9 0 0 1 8 -4" fill="none" stroke="#7fa828" stroke-width="3" stroke-linecap="round" />
    <polygon points="8,-4 4,-8 12,-8" fill="#7fa828" />
    
    <path d="M 8 4 A 9 9 0 0 1 -8 4" fill="none" stroke="#7fa828" stroke-width="3" stroke-linecap="round" />
    <polygon points="-8,4 -4,8 -12,8" fill="#7fa828" />
  </g>
</svg>
