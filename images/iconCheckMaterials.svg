<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Pipe cross-section. No clipPath — line segments pre-calculated to fall
    exactly within the annular wall (outer r=20, inner r=10, center 32,32).

    For 45° lines y = -x + c, intersections with circle (x-32)²+(y-32)²=R²:
      t = [(c-64) ± √(2R²-(c-64)²)] / 2,  x=32+t, y=c-x
    Lines split when they also cross the inner circle.
    Step = 6px along the diagonal axis.
  -->

  <!-- Hatching lines (green), drawn only inside the annular wall -->
  <g stroke="#7fa828" stroke-width="2.5" stroke-linecap="round">
    <!-- c=36: short segment at outer edge, no inner crossing -->
    <line x1="16"  y1="20"  x2="20"  y2="16"/>
    <!-- c=42: full chord across wall, no inner crossing -->
    <line x1="12.1" y1="29.9" x2="29.9" y2="12.1"/>
    <!-- c=48: full chord across wall, no inner crossing -->
    <line x1="12.3" y1="35.7" x2="35.7" y2="12.3"/>
    <!-- c=54: split — inner circle cuts through -->
    <line x1="13.8" y1="40.2" x2="22"   y2="32"/>
    <line x1="32"   y1="22"   x2="40.2" y2="13.8"/>
    <!-- c=60: split -->
    <line x1="16"   y1="44"   x2="23.2" y2="36.8"/>
    <line x1="36.8" y1="23.2" x2="44"   y2="16"/>
    <!-- c=66: split -->
    <line x1="18.9" y1="47.1" x2="26"   y2="40"/>
    <line x1="40"   y1="26"   x2="47.1" y2="18.9"/>
    <!-- c=72: split -->
    <line x1="22.4" y1="49.6" x2="30.2" y2="41.8"/>
    <line x1="41.8" y1="30.2" x2="49.6" y2="22.4"/>
    <!-- c=78: split -->
    <line x1="26.7" y1="51.3" x2="38"   y2="40"/>
    <line x1="40"   y1="38"   x2="51.3" y2="26.7"/>
    <!-- c=84: full chord, no inner crossing -->
    <line x1="32"   y1="52"   x2="52"   y2="32"/>
    <!-- c=90: short segment at outer edge -->
    <line x1="39.4" y1="50.6" x2="50.6" y2="39.4"/>
  </g>

  <!-- Outer pipe edge (blue) -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#60bcd3" stroke-width="3.5"/>
  <!-- Inner bore edge (blue) -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#60bcd3" stroke-width="3"/>

  <!-- "M" for Material, centered in bore (green) -->
  <text x="32" y="36" font-family="Arial, sans-serif" font-size="11" font-weight="bold"
        fill="#7fa828" text-anchor="middle">M</text>
</svg>
